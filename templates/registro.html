<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B3E">
    <title>Crear cuenta — AstroSecurity</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AstroSecurity" class="auth-logo">
            <h2 style="margin-bottom:4px;">Crea tu cuenta</h2>
            <p style="margin-bottom:0; font-size:14px;">Tu progreso se guardará en todos tus dispositivos.</p>
        </div>

        {% if error %}
        <div class="flash-msg flash-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('registro') }}">
            <div class="campo">
                <label>Nombre de usuario</label>
                <input type="text" name="nombre" placeholder="Ej. María López" required autocomplete="name">
            </div>
            <div class="campo">
                <label>Correo electrónico</label>
                <input type="email" name="correo" placeholder="correo@ejemplo.com" required autocomplete="email">
            </div>
            <div class="campo">
                <label>Contraseña (mín. 6 caracteres)</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
            </div>
            <div class="campo">
                <label>¿Qué te preocupa de tu seguridad digital?</label>
                <textarea name="preocupacion" placeholder="Describe brevemente tu principal preocupación..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Crear cuenta y comenzar</button>
        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
        </p>
    </div>
</body>
</html>
