<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0D1B3E">
    <title>AstroSecurity</title>
    <meta name="application-name" content="AstroSecurity">
    <meta name="description" content="Seguro hasta en las estrellas">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AstroSecurity">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-180.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="welcome-wrap">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AstroSecurity" class="welcome-logo">
        <h1 class="welcome-title"><span>Astro</span>Security</h1>
        <p class="welcome-slogan">"Seguro hasta en las estrellas"</p>
        <div class="welcome-divider"></div>
        <p style="margin-bottom: 40px; max-width: 320px;">
            Fortalece tu conocimiento en ciberseguridad a través de cuestionarios interactivos diseñados para protegerte en el entorno digital.
        </p>
        <a href="{{ url_for('presentacion') }}" class="btn btn-primary" style="max-width:320px">
            Comienzo
        </a>
    </div>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js', { scope: '/' });
        });
    }
    </script>
</body>
</html>
