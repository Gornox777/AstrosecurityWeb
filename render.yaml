services:
  - type: web
    name: astrosecurity
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: astrosecurity-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: astrosecurity-db
    databaseName: astrosecurity
    user: astrosecurity
